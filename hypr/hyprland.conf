# S I M P L E   R I C E

# ---------------------------------------------
# K e y b o a r d   c o n f i g s / b i n d s .
# ---------------------------------------------

# Language settings

input {
    kb_layout = fr
}

# Binds

bind = SUPER, S, exec, kitty --single-instance
bind = SUPER, Q, killactive
bind = SUPER, Y, exec, firefox
bind = SUPER, Space, exec, rofi -show drun
bind = SUPER, R,     exec, hyprctl reload
bind = SUPER, G, exec, steam
bind = SUPER, V, exec, flatpak run com.vscodium.codium
bind = SUPER, M, exec, hyprctl dispatch exit
bind = SUPER, N, movetoworkspacesilent, special:minimized
bind = SUPER, B, exec, ~/.config/hypr/scripts/unminimize.sh
bind = SUPER, E, exec, dolphin
bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow
binde = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.0 @DEFAULT_AUDIO_SINK@ 5%+
binde = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

# -----------------------------------
# D e s i g n / A n i m a t i o n s .
# -----------------------------------

# Animations

animations {
    enabled = true

    bezier = easeOut, 0.16, 1, 0.3, 1

    animation = windows,    1, 3, easeOut, slide
    animation = windowsIn,  1, 3, easeOut, popin 80%
    animation = windowsOut, 1, 2, easeOut, popin 80%
    animation = fade,       1, 3, easeOut
    animation = workspaces, 1, 3, easeOut, slide
}

# Design

general {
    border_size = 0
}

decoration {
    rounding = 20
    blur {
	enabled = true
	size = 10
	passes = 3
    }
}

# Rules

layerrule {
    name = rofi_blur
    match:namespace = ^(rofi)$
    blur = true
}

layerrule {
    name = waybar_blur
    match:namespace = waybar
    blur = true
    ignore_alpha = 0.05
    xray = true
}

layerrule {
    name = rofi_alpha
    match:namespace = ^(rofi)$
    ignore_alpha = true
}

# ---------
# E x t r a
# ---------

# Auto-start

exec-once = waybar &

# env things

env = WLR_NO_HARDWARE_CURSORS,1
env = XCURSOR_THEME,Adwaita
env = XCURSOR_SIZE,24

cursor {
    no_hardware_cursors = true
}
